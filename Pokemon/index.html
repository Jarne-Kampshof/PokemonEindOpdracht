<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokédex</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Pokedex</h1>
    </header>

    <main>
        <div class="sectie-header">
            <h2>Alle Pokemons</h2>
        </div>

        <p id="loading">Laden...</p>

        <div id="pokemon-grid" class="pokemon-grid" hidden></div>

        <div id="pagination" class="pagination" hidden>
            <button id="btn-prev" class="paginering-knop">&#8592; Vorige</button>
            <span id="page-indicator" class="pagina-indicator"></span>
            <button id="btn-next" class="paginering-knop">Volgende &#8594;</button>
        </div>
    </main>

    <script src="app.js"></script>
</body>

</html>
